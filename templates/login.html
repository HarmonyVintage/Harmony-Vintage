<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HV</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 85%; max-width: 350px; text-align: center; }
        .brand { font-family: 'Brush Script MT', cursive, serif; font-size: 40px; color: #d4af37; margin-bottom: 30px; letter-spacing: 1px;}
        .input-field { width: 100%; padding: 14px; margin-bottom: 12px; background-color: #121212; border: 1px solid #262626; color: white; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 14px; background-color: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; }
        .link { color: #0095f6; font-size: 13px; text-decoration: none; display: block; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">Harmony Vintage</div>
        <form method="POST" action="/login">
            <input type="email" name="email" class="input-field" placeholder="Email" required>
            <input type="password" name="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="btn">Log In</button>
        </form>
        <a href="/register" class="link">Don't have an account? Sign up.</a>
    </div>
</body>
      </html>
